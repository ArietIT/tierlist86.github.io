<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Bedrock Tier Lists</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>MCBE TIERS</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#create">Rankings</a>
            <a href="#browse">Contacts</a>
        </nav>
    </header>
    <main>
        <section class="rankings-panel">
            <div class="top-bar">
                <div class="logo">MCBETIERS</div>
                <div class="nav-tabs">
                    <button class="tab active" data-tab="overall">Overall</button>
                    <button class="tab" data-tab="ltms">LTMs</button>
                    <button class="tab" data-tab="vanilla">Vanilla</button>
                    <button class="tab" data-tab="uhc">UHC</button>
                    <button class="tab" data-tab="pot">Pot</button>
                    <button class="tab" data-tab="nthop">NethOP</button>
                    <button class="tab" data-tab="smp">SMP</button>
                    <button class="tab" data-tab="sword">Sword</button>
                    <button class="tab" data-tab="axe">Axe</button>
                    <button class="tab" data-tab="mace">Mace</button>
                </div>
                <div class="search-block">
                    <input type="text" placeholder="Search player...">
                </div>
            </div>
            <div class="table-wrap">
                <table class="rankings-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player</th>
                            <th>Tiers</th>
                            <th>Points</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="rank-cell"><img src="https://via.placeholder.com/50/FFD700/000?text=1" alt="Rank 1"></td>
                            <td>SpeedSilver1313<br><span class="role">Combat Grandmaster</span></td>
                            <td class="tier-cell">
                                <div class="tier-icons">
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/7/7e/Netherite_Sword_JE2_BE2.png" alt="Sword"></div>
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/2/2c/Diamond_Sword_JE3_BE3.png" alt="Diamond"></div>
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/4/4b/Iron_Sword_JE2_BE2.png" alt="Iron"></div>
                                </div>
                                <div class="tier-badge-row"><span class="tier-badge">HT1</span><span class="tier-badge">LT1</span></div>
                            </td>
                            <td>450</td>
                        </tr>
                        <tr>
                            <td class="rank-cell"><img src="https://via.placeholder.com/50/C0C0C0/000?text=2" alt="Rank 2"></td>
                            <td>MX<br><span class="role">Combat Master</span></td>
                            <td class="tier-cell">
                                <div class="tier-icons">
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/1/15/Creeper_JE3_BE2.png" alt="Creeper"></div>
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/8/8b/Stone_Sword_JE2_BE2.png" alt="Stone"></div>
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/4/4b/Wooden_Sword_JE2_BE2.png" alt="Wooden"></div>
                                </div>
                                <div class="tier-badge-row"><span class="tier-badge">HT3</span><span class="tier-badge">LT2</span></div>
                            </td>
                            <td>330</td>
                        </tr>
                        <tr>
                            <td class="rank-cell"><img src="https://via.placeholder.com/50/CD7F32/000?text=3" alt="Rank 3"></td>
                            <td>VoidTwister<br><span class="role">Combat Master</span></td>
                            <td class="tier-cell">
                                <div class="tier-icons">
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/5/50/Chicken_JE2_BE2.png" alt="Chicken"></div>
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/7/70/Zombie_JE3_BE2.png" alt="Zombie"></div>
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/8/8f/Wither_JE3_BE3.png" alt="Wither"></div>
                                </div>
                                <div class="tier-badge-row"><span class="tier-badge">LT1</span><span class="tier-badge">HT2</span></div>
                            </td>
                            <td>296</td>
                        </tr>
                        <tr>
                            <td class="rank-cell"><img src="https://via.placeholder.com/50/808080/FFF?text=4" alt="Rank 4"></td>
                            <td>PastS1mple<br><span class="role">Combat Master</span></td>
                            <td class="tier-cell">
                                <div class="tier-icons">
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/0/0f/Ender_Dragon.png" alt="Ender Dragon"></div>
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/7/70/Zombie_JE3_BE2.png" alt="Zombie"></div>
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/1/15/Creeper_JE3_BE2.png" alt="Creeper"></div>
                                </div>
                                <div class="tier-badge-row"><span class="tier-badge">HT3</span><span class="tier-badge">LT2</span></div>
                            </td>
                            <td>290</td>
                        </tr>
                        <tr>
                            <td class="rank-cell"><img src="https://via.placeholder.com/50/808080/FFF?text=5" alt="Rank 5"></td>
                            <td>ArietVtoroi<br><span class="role">Combat Ace</span></td>
                            <td class="tier-cell">
                                <div class="tier-icons">
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/7/7e/Netherite_Axe_JE2_BE2.png" alt="Netherite Axe"></div>
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/2/2c/Diamond_Axe_JE3_BE3.png" alt="Diamond Axe"></div>
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/4/4b/Iron_Axe_JE2_BE2.png" alt="Iron Axe"></div>
                                </div>
                                <div class="tier-badge-row"><span class="tier-badge">LT1</span><span class="tier-badge">LT2</span></div>
                            </td>
                            <td>230</td>
                        </tr>
                        <tr>
                            <td class="rank-cell"><img src="https://via.placeholder.com/50/808080/FFF?text=6" alt="Rank 6"></td>
                            <td>Aydar4ikkk<br><span class="role">Combat Ace</span></td>
                            <td class="tier-cell">
                                <div class="tier-icons">
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/8/8b/Stone_Axe_JE2_BE2.png" alt="Stone Axe"></div>
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/4/4b/Wooden_Axe_JE2_BE2.png" alt="Wooden Axe"></div>
                                    <div class="tier-dot"><img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/5/50/Chicken_JE2_BE2.png" alt="Chicken"></div>
                                </div>
                                <div class="tier-badge-row"><span class="tier-badge">HT2</span><span class="tier-badge">LT3</span></div>
                            </td>
                            <td>226</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
